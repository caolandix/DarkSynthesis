name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Jumpdrive library
      uses: actions/checkout@v4
      with:
        repository: caolandix/jumpdrive
        path: jumpdrive  # Local directory where library will be placed
    - uses: actions/checkout@v4
    - name: configure
      run: ./configure
    - name: Configure and Build
      run: |
        cmake -B ${{github.workspace}}
        cmake --build ${{github.workspace}}
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
